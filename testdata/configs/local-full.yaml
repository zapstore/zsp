# Full local config with all options
release_source: "../apks/sample.apk"

# App metadata (overrides APK-extracted values)
name: Sample App
description: Just a sample APK for testing
summary: Sample summary
tags: [zapstore, repository, test]
license: MIT
website: https://zapstore.dev

# Custom icon (otherwise extracted from APK)
icon: "../fixtures/icon.png"

# Screenshots (local and remote)
images:
  - ../fixtures/screenshot.png
  - https://raw.githubusercontent.com/purplebase/purplestack/main/assets/images/purplestack.png

# Source code repository (for display, not fetching)
repository: https://github.com/zapstore/zapstore

# Changelog file
changelog: ../fixtures/CHANGELOG.md

# Communities: h-tag values for kind 32267 events.
# The app will appear in each listed Nostr community.
# Defaults to the Zapstore catalog pubkey (hex) if omitted (see nostr.DefaultCommunity).
# Single community:   communities: [acfeaea6e51420e8068fac446ca9d17d7a9ef6a5d20d93894e50fee3d4902a84]
# Multiple:           communities: [acfeaea6e51420e8068fac446ca9d17d7a9ef6a5d20d93894e50fee3d4902a84, fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210]
communities: [acfeaea6e51420e8068fac446ca9d17d7a9ef6a5d20d93894e50fee3d4902a84]

# Fetch additional metadata
fetch_metadata: [github]
